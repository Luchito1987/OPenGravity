services:
  - type: web
    name: opengravity-bot
    env: docker
    plan: free
    region: oregon
    dockerFilePath: Dockerfile
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ALLOWED_USER_IDS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        description: "Paste the full JSON content of your service-account.json here"
        sync: false
